<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitorador de Servidores</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#0B0E14">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen" class="login-wrapper">
        <div class="login-box">
            <h2><i class="ph ph-lock-key"></i> Acesso Restrito</h2>
            <p>System Security</p>
            <div class="input-group">
                <i class="ph ph-user"></i>
                <input type="text" id="login-user" placeholder="Usuário">
            </div>
            <div class="input-group">
                <i class="ph ph-password"></i>
                <input type="password" id="login-pass" placeholder="Senha">
            </div>
            <p id="login-error" style="color: var(--accent-danger); font-size: 0.85rem; display: none; margin-bottom: 1rem;">Credenciais inválidas!</p>
            <button class="btn-login" onclick="performLogin()">Entrar <i class="ph ph-arrow-right"></i></button>
        </div>
    </div>

    <div id="dashboard-screen" style="display: none;">
        <header>
            <div>
                <h1>Monitorador de Servidores</h1>
                <p>Monitoramento de Infraestrutura e Discos</p>
            </div>
            <button class="btn-refresh" id="btn-refresh" onclick="fetchData()">
                <i class="ph ph-arrows-clockwise"></i> Atualizar Dados
            </button>
        </header>

        <main>
            <div id="loader-main" class="loader"></div>
            
            <div class="servers-grid" id="servers-container">
                <!-- Servidores injetados via JS -->
            </div>
        </main>
    </div>

    <!-- Modal Explorador de Arquivos -->
    <div class="modal-overlay" id="explorer-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="ph ph-folder-open"></i> Explorador de Arquivos</h2>
                <button class="btn-icon" onclick="closeExplorer()"><i class="ph ph-x"></i></button>
            </div>
            
            <div class="explorer-toolbar">
                <button class="btn-icon" onclick="navigateUp()"><i class="ph ph-arrow-up"></i></button>
                <input type="text" class="path-input" id="current-path" readonly>
                <button class="btn-action" onclick="document.getElementById('file-upload').click()">
                    <i class="ph ph-upload-simple"></i> Enviar
                </button>
                <input type="file" id="file-upload" style="display: none;" onchange="uploadFile(event)">
            </div>

            <div class="explorer-body">
                <div id="explorer-loader" class="loader" style="display: none;"></div>
                <div class="files-list" id="files-list">
                    <!-- Arquivos aqui -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW falhou:', err));
            });
        }
    </script>
</body>
</html>
