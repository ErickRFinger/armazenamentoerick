<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente de Fundo Premium -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E2430" />
      <stop offset="100%" stop-color="#0B0E14" />
    </linearGradient>
    
    <!-- Efeito de Brilho Neon (Glow) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base do Ícone Arredondada (estilo App da Apple) -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgGrad)"/>
  
  <!-- Rack de Servidores Central -->
  <rect x="96" y="96" width="320" height="320" rx="32" fill="#0F172A" stroke="#334155" stroke-width="6"/>
  
  <!-- Blade 1 -->
  <rect x="128" y="136" width="256" height="64" rx="12" fill="#1E293B"/>
  <!-- Luz de Status Verde Piscando -->
  <circle cx="164" cy="168" r="10" fill="#10B981" filter="url(#glow)"/>
  <!-- Faixa de Dados Azul Neon -->
  <rect x="204" y="164" width="140" height="8" rx="4" fill="#3B82F6" filter="url(#glow)"/>
  
  <!-- Blade 2 -->
  <rect x="128" y="224" width="256" height="64" rx="12" fill="#1E293B"/>
  <circle cx="164" cy="256" r="10" fill="#10B981" filter="url(#glow)"/>
  <rect x="204" y="252" width="140" height="8" rx="4" fill="#3B82F6" filter="url(#glow)"/>
  
  <!-- Blade 3 (Banco de Dados / Discos) -->
  <rect x="128" y="312" width="256" height="64" rx="12" fill="#1E293B"/>
  <circle cx="164" cy="344" r="10" fill="#10B981" filter="url(#glow)"/>
  <rect x="204" y="340" width="140" height="8" rx="4" fill="#3B82F6" filter="url(#glow)"/>
  
  <!-- Reflexo Superior para efeito de vidro (Glassmorphism) -->
  <path d="M 0 110 Q 256 250 512 110 L 512 0 L 0 0 Z" fill="#ffffff" opacity="0.03"/>
</svg>
